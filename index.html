<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Nybotic's GitHub projects.">
    <title>Nybotic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="profile reveal" aria-labelledby="profile-name">
        <img class="avatar" id="avatar" src="assets/hero-visual.png" alt="Nybotic GitHub avatar">
        <div class="profile-copy">
          <p class="handle">github.com/nybotic</p>
          <h1 id="profile-name">Nybotic</h1>
          <p id="profile-bio">Stuff I have put on GitHub.</p>
        </div>
      </section>

      <dl class="stats reveal" aria-label="GitHub repository count">
        <div>
          <dt>Repos</dt>
          <dd id="repo-count">--</dd>
        </div>
      </dl>

      <section class="repos" aria-labelledby="repos-title">
        <h2 id="repos-title">repos</h2>
        <p class="section-note">A few public projects. Some are finished enough, some are just experiments.</p>
        <div class="repo-list" id="repo-list" aria-live="polite">
          <article class="repo loading">
            <h3>Loading repositories</h3>
            <p>Fetching public repos from GitHub.</p>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <span>© <span id="year"></span> Nybotic</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
